<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <style>
      .paper { 
        fill: #1E293B; /* Dark Slate Paper */
        mask: url(#line-cutout); /* Apply the transparency mask */
      }
      .binding { fill: #1E293B; } /* Matching Binding Color */
    </style>
    
    <!-- DEFINE THE MASK -->
    <mask id="line-cutout">
      <!-- 1. White rectangle = Visible Paper area -->
      <rect x="0" y="0" width="400" height="500" fill="white" />
      
      <!-- 2. Black lines = Transparent "Holes" in the paper -->
      <g stroke="black" stroke-width="18" stroke-linecap="round">
        <line x1="130" y1="95" x2="320" y2="95" />
        <line x1="130" y1="155" x2="320" y2="155" />
        <line x1="130" y1="215" x2="320" y2="215" />
        <line x1="130" y1="275" x2="320" y2="275" />
        <line x1="130" y1="335" x2="320" y2="335" />
        <line x1="130" y1="395" x2="320" y2="395" />
      </g>
    </mask>
  </defs>

  <!-- Main Paper Body with Mask Applied -->
  <rect x="80" y="40" width="280" height="420" rx="20" class="paper" />

  <!-- Binding Rings -->
  <g class="binding">
    <rect x="50" y="65" width="50" height="20" rx="10" />
    <rect x="50" y="125" width="50" height="20" rx="10" />
    <rect x="50" y="185" width="50" height="20" rx="10" />
    <rect x="50" y="245" width="50" height="20" rx="10" />
    <rect x="50" y="305" width="50" height="20" rx="10" />
    <rect x="50" y="365" width="50" height="20" rx="10" />
    <rect x="50" y="425" width="50" height="20" rx="10" />
  </g>
  
  <!-- Note: We removed the <g> that drew the colored lines because the mask handles them now -->

</svg>